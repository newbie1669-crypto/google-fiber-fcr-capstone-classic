# .github/workflows/dbt_ci.yml
# Auto-run dbt build (run + test) on every push or PR to main.
#
# Required GitHub repo settings:
#   Secrets   → GCP_SA_KEY      : full content of the service-account JSON key
#   Variables → GCP_PROJECT_ID  : your GCP project ID (e.g. gbi-test)
#   Variables → BQ_LOCATION     : BigQuery region (e.g. US)

name: dbt CI — Google Fiber

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  dbt-build:
    runs-on: ubuntu-latest

    env:
      DBT_PROFILES_DIR: ${{ github.workspace }}/.dbt

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dbt-bigquery
        run: pip install dbt-bigquery==1.8.*

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # The auth step above exports GOOGLE_APPLICATION_CREDENTIALS.
      # Generate a CI profiles.yml that uses oauth (Application Default Credentials).
      - name: Generate dbt profile for CI
        run: |
          mkdir -p "${DBT_PROFILES_DIR}"
          cat > "${DBT_PROFILES_DIR}/profiles.yml" <<EOF
          google_fiber:
            target: prod
            outputs:
              prod:
                type: bigquery
                method: oauth
                project: ${{ vars.GCP_PROJECT_ID }}
                dataset: dbt_prod
                location: ${{ vars.BQ_LOCATION }}
                threads: 8
                timeout_seconds: 300
                priority: batch
          EOF

      - name: Install dbt packages
        run: dbt deps
        working-directory: ./dbt

      - name: dbt build (run + test on prod)
        run: dbt build --target prod
        working-directory: ./dbt

      - name: Upload run results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dbt-run-results
          path: ./dbt/target/run_results.json
