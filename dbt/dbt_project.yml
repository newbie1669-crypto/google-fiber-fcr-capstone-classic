name: 'google_fiber'
version: '1.0.0'
config-version: 2

profile: 'google_fiber'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  google_fiber:
    staging:
      +materialized: view        # staging = lightweight views
    marts:
      +materialized: table       # marts = tables, ready for BI tools
# Note: no per-folder +schema is set, so every model is created in the
# dataset defined in profiles.yml (dbt_dev / dbt_prod). Setting +schema
# would make BigQuery append it, producing dbt_prod_staging / dbt_prod_marts.
