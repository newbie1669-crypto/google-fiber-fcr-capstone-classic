# models/staging/_schema.yml
# Data-quality tests for the staging layer — run with: dbt test
# Note: generic-test arguments are nested under `arguments:` (required by dbt 1.10+).

version: 2

models:
  - name: stg_market_1
    description: "Cleaned staging data from Market 1"
    columns:
      - name: date_created
        tests:
          - not_null
      - name: contacts_n
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"
      - name: new_type
        tests:
          - not_null
      - name: new_market
        tests:
          - not_null

  - name: stg_market_2
    description: "Cleaned staging data from Market 2"
    columns:
      - name: date_created
        tests:
          - not_null
      - name: contacts_n
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"
      - name: new_type
        tests:
          - not_null
      - name: new_market
        tests:
          - not_null

  - name: stg_market_3
    description: "Cleaned staging data from Market 3"
    columns:
